version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: bds-store-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bds_store_vpn
      POSTGRES_USER: bds_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bds_admin -d bds_store_vpn"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bds-network

  # ============================================
  # Backend API Server (Node.js Express)
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bds-store-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bds_store_vpn
      DB_USER: bds_admin
      DB_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_very_long_random_string}
      JWT_EXPIRES_IN: 30d
      ADMOB_REWARD_DURATION_HOURS: 2
      XUI_PANEL_URL: ${XUI_PANEL_URL}
      XUI_USERNAME: ${XUI_USERNAME}
      XUI_PASSWORD: ${XUI_PASSWORD}
    ports:
      - "3000:3000"
    networks:
      - bds-network

  # ============================================
  # Redis (Optional - for caching & rate limiting)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: bds-store-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bds-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  bds-network:
    driver: bridge
